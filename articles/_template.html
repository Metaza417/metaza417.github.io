<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} | fihmiplaw</title>
<meta name="description" content="{{DESCRIPTION}}">
<meta name="author" content="始终在路上">
<meta name="keywords" content="{{KEYWORDS}}">

<!-- Open Graph -->
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="{{OG_DESCRIPTION}}">
<meta property="og:type" content="article">
<meta property="og:site_name" content="fihmiplaw">
<meta property="article:author" content="始终在路上">
<meta property="article:published_time" content="{{DATE}}">

<!-- Schema.org Article -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{TITLE}}",
  "description": "{{DESCRIPTION}}",
  "author": { "@type": "Person", "name": "始终在路上", "url": "https://metaza417.github.io" },
  "datePublished": "{{DATE}}",
  "dateModified": "{{DATE}}",
  "publisher": { "@type": "Organization", "name": "fihmiplaw" },
  "about": { "@type": "Thing", "name": "{{TOPIC}}" },
  "keywords": "{{KEYWORDS}}",
  "inLanguage": "zh-CN"
}
</script>

<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
  <div class="wrap">
    <div class="brand">fihmiplaw</div>
    <div class="brand-sub">知识产权 · 债权债务 · 公司法 · 行政征收</div>
    <nav>
      <a href="../index.html">首页</a>
      <a href="../index.html#articles">文章</a>
    </nav>
  </div>
</header>

<article class="article">

  <div class="breadcrumb">
    <a href="../index.html">首页</a> &rsaquo; 文章
  </div>

  <h1>{{TITLE}}</h1>

  <div class="meta">
    {{DATE_CN}} · 署名：始终在路上 · 公众号：fihmiplaw
  </div>

{{CONTENT}}

<div class="cta-box">
  <div class="cta-qr">
    <img src="../images/wechat-qr.png?v=2" alt="微信二维码" width="100" height="100">
    <div class="cta-qr-text">
      <div class="fee">欢迎咨询</div>
      <div class="note">扫码添加微信 · 请备注咨询领域</div>
    </div>
  </div>
</div>

<div class="article-byline">
  <p>调研 & 撰写：AI（Claude）</p>
  <p>主导 & 审校：始终在路上</p>
  <p>公众号：fihmiplaw</p>
</div>

</article>

<footer>
  <div class="footer-qr">
    <img src="../images/wechat-qr.png?v=2" alt="微信二维码" width="120" height="120">
    <div class="footer-qr-text">
      <div class="footer-qr-title">欢迎咨询</div>
      <div class="footer-qr-sub">扫码添加微信 · 请备注咨询领域</div>
    </div>
  </div>
  <div style="margin-top:16px;font-size:12px;color:var(--silver);">&copy; 2025 fihmiplaw · 署名：始终在路上</div>
</footer>

</body>
</html>
